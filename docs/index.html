<!DOCTYPE html>
<html>
<head>
    <title>DNA Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>🚀 DNA Dashboard</h1>
<button onclick="carica()">Carica dati</button>

<canvas id="grafico"></canvas>

<script>
async function carica() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/marcellospiga123-jpg/dnacards-monitor/main/storico.json");

        if (!res.ok) throw new Error("Errore fetch");

        const data = await res.json();

        const labels = data.map(d => d.timestamp);

        const prezzi = data.map(d => {
            const disponibili = d.prodotti.filter(p => p.disponibile);
            return disponibili.length ? disponibili[0].prezzo : 0;
        });

        new Chart(document.getElementById("grafico"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Prezzo medio disponibile",
                    data: prezzi
                }]
            }
        });

    } catch (e) {
        alert("ERRORE fetch dati.json");
        console.error(e);
    }
}
</script>

</body>
</html>
